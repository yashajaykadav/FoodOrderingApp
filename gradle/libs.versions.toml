compiler = "4.15.1"
gson = "2.10.1"
kotlin = "2.1.0"
coreKtx = "1.15.0"
junit = "4.13.2"
junitVersion = "1.2.1"
espressoCore = "3.6.1"
appcompat = "1.7.0"
kotlinStdlib = "2.0.21"
lottie = "5.2.0"
material = "1.12.0"
activity = "1.10.1"
constraintlayout = "2.2.1"
firebase-bom = "32.2.2"
firebase-auth = "22.0.0"
firebase-firestore = "24.9.1"
google-services = "4.3.15"
play-services-auth = "20.7.0"
google-auth = "20.7.0"
